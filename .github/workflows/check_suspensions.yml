name: Check Tennis Suspensions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run suspension check
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: python check_suspensions.py

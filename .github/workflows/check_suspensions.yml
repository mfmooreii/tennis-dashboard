name: Check Tennis Suspensions

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore state cache
        uses: actions/cache@v4
        with:
          path: state.json
          key: tennis-state-${{ github.run_id }}
          restore-keys: tennis-state-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run suspension check
        env:
          TENNIS_API_KEY: ${{ secrets.TENNIS_API_KEY }}
        run: python check_suspensions.py

      - name: Save state cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: state.json
          key: tennis-state-${{ github.run_id }}
